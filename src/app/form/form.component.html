<div class="main">
  @if (!clicked) {
    <div class="page-divider">
      <form class="clinic-form glass-card" #clinicForm="ngForm">
        <div class="form-header">
          <h2>Înregistrează clinica</h2>
          <p>Adaugă informațiile clinicii pentru listarea pe DentiPro</p>
        </div>

        <div class="form-section">
          <h3>Informații clinică</h3>

          <div class="two">
            <label class="input-group">
              <span>Nume clinică</span>
              <input
                type="text"
                name="name"
                [(ngModel)]="formData.name"
                (input)="getName($event)"
              />
            </label>

            <label class="input-group">
              <span>Telefon clinică</span>
              <input
                type="tel"
                name="phone"
                [(ngModel)]="formData.phone"
                required
                (input)="getTel($event)"
              />
            </label>
          </div>

          <div class="two">
            <label class="input-group">
              <span>Email</span>
              <input
                type="email"
                name="email"
                [(ngModel)]="formData.email"
                (input)="getEmail($event)"
              />
            </label>

            <label class="input-group">
              <span>Confirmare email</span>
              <input
                type="email"
                name="confirmEmail"
                [(ngModel)]="formData.confirmEmail"
              />
            </label>
          </div>
        </div>

        <div class="form-section">
          <h3>Media clinică</h3>

          <div class="upload-grid">
            <label class="upload-card">
              <div class="upload-icon">⬆</div>
              <p>Încarcă logo</p>

              <input
                type="file"
                name="logo"
                (change)="onLogoUpload($event)"
                accept="image/*"
              />
            </label>

            <label class="upload-card">
              <div class="upload-icon">⬆</div>
              <p>Imagini clinică</p>

              <input
                type="file"
                name="clinicImages"
                (change)="onImagesUpload($event)"
                multiple
                accept="image/*"
              />
            </label>
          </div>
        </div>

        <div class="form-section">
          <h3>Locație clinică</h3>

          <app-orase
            (citySelected)="formData.city = $event"
            (citySelected)="formInput.oras = $event"
          >
          </app-orase>

          <div class="map-container">
            <p>Selectează locația pe hartă</p>

            <app-google-maps (locationSelected)="onLocationSelected($event)">
            </app-google-maps>
          </div>
        </div>

        <div class="form-section">
          <h3>Preferințe</h3>

          <div class="radio-group">
            <label class="radio-card">
              <input
                type="radio"
                name="share-prices"
                (change)="formData.showPrices = true"
              />

              <span>Arată prețurile</span>
            </label>

            <label class="radio-card">
              <input
                type="radio"
                name="share-prices"
                (change)="formData.showPrices = false"
              />

              <span>Nu arăta prețurile</span>
            </label>
          </div>
        </div>

        <div class="form-section">
          <label class="input-group">
            <span>Telefon manager</span>

            <input
              type="tel"
              name="managerPhone"
              placeholder="07xxxxxxxx"
              [(ngModel)]="formData.managerPhone"
            />
          </label>

          <label class="input-group">
            <span>Observații</span>

            <textarea
              rows="3"
              maxlength="100"
              [(ngModel)]="formData.additionalNotes"
              name="additionalNotes"
            ></textarea>
          </label>
        </div>

        <div class="terms">
          <label>
            <input
              type="checkbox"
              [(ngModel)]="formData.termsAccepted"
              name="terms"
            />
            Accept termenii
          </label>

          <label>
            <input
              type="checkbox"
              [(ngModel)]="formData.onWebAccepted"
              name="onWeb"
            />
            Accept publicarea datelor
          </label>
        </div>

        <button
          class="submit-btn"
          type="submit"
          [disabled]="isLoading"
          (click)="onSubmit()"
        >
          {{ isLoading ? "Se trimite..." : "Trimite cererea" }}
        </button>
      </form>

      <app-iphone-preview
        [transferData]="formInput"
        (closeViewer)="clicked = false"
        [dataForImage]="formData"
      >
      </app-iphone-preview>
    </div>
  }
</div>
