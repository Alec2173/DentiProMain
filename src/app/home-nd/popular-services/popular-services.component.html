<section class="ps-section">
  <div class="ps-container">

    <!-- HEADER -->
    <div class="section-header">
      <span class="section-badge">Servicii populare</span>
      <h2 class="section-title">
        Cele mai căutate<br>
        <span class="title-gradient">servicii dentare</span>
      </h2>
      <p class="section-subtitle">
        Găsește rapid clinici specializate în serviciul de care ai nevoie.
      </p>
    </div>

    <!-- GRID -->
    <div class="services-grid">
      @for (service of featured; track service.id) {
        <div class="service-card" (click)="navigate(service.id)">
          <div class="service-icon-wrap">
            <span class="material-symbols-outlined">{{ service.icon }}</span>
          </div>
          <div class="service-body">
            <h3 class="service-title">{{ service.label }}</h3>
            <p class="service-desc">{{ service.desc }}</p>
          </div>
          <div class="service-cta">
            <span class="service-link">Caută clinici</span>
            <span class="material-symbols-outlined service-arrow">arrow_forward</span>
          </div>
        </div>
      }
    </div>

  </div>
</section>
